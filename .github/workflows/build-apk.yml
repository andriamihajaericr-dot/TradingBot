name: Build Trading Bot APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Crée la variable de date pour GitHub
      - name: Generate Build Date for GitHub
        id: date
        run: echo "CURRENT_DATE=$(date +'%d%m%Y-%H'H'%M')" >> $GITHUB_ENV

      - name: Install & Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.1.1'
          cache-disabled: true

      # 🟢 STRATÉGIE 1 : RESTAURATION ET PRÉPARATION DU CACHE DE LA BASE DE DONNÉES
      # Cette étape cherche une sauvegarde existante sur les serveurs de GitHub.
      - name: Restaurer la base de données SQLite du Bot
        uses: actions/cache@v4
        with:
          path: |
            **/databases/trading_bot.db
            **/databases/trading_bot.db-shm
            **/databases/trading_bot.db-wal
          # Clé unique basée sur le commit actuel pour la sauvegarde
          key: trading-bot-db-${{ github.sha }}
          # Si aucune clé exacte n'est trouvée, GitHub récupère la sauvegarde la plus récente qui commence par ce préfixe
          restore-keys: |
            trading-bot-db-

      # On compile le projet
      - name: Build Debug APK
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          # Ici on écrit en dur le début "V1.0.1" pour correspondre au build.gradle
          # et on ajoute la date dynamique juste après
          name: Fonda_IOF_V1.0.1_${{ env.CURRENT_DATE }}
          path: app/build/outputs/apk/debug/**/*.apk
          retention-days: 30
