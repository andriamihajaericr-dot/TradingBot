name: Build Trading Bot APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install & Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          # ALIGNEMENT TECHNIQUE : Passage en 8.1.1 pour supporter ton plugin 8.1.0
          gradle-version: '8.1.1'
          cache-disabled: true

      - name: Build Debug APK
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TradingBot-APK
          # Recherche universelle pour capturer l'APK quel que soit son nom de version
          path: app/build/outputs/apk/debug/**/*.apk
          retention-days: 30
