name: Build Trading Bot APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Force l'exécution sous Node.js 24 pour éliminer les warnings d'infrastructure
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install & Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0'
          # CORRECTION : Empêche le build d'échouer ou de lever des alertes si les serveurs
          # de cache de GitHub (actuellement instables) rejettent la connexion.
          cache-disabled: false

      - name: Build Debug APK
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TradingBot-APK
          # CORRECTION STRICTE : Alignement du chemin sur le nom réel de ton fichier généré
          path: app/build/outputs/apk/debug/Fonda_IOF_V1.0.3.apk
          retention-days: 30
